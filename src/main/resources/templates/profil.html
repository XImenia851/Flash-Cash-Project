<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mon Profil - Flash Cash</title>
    <link th:href="@{/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/profil.css}" rel="stylesheet">
</head>

<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <div class="card my-5">
                <div class="card-body">

                    <!-- Logo et titre -->
                    <div class="text-center mb-4">
                        <img th:src="@{/images/Gemini_Generated_Image_7im9xj7im9xj7im9-removebg-preview.png}"
                             alt="Logo Flash Cash" class="img-fluid">
                        <h4 class="card-title mt-3">Mon Profil</h4>
                        <p>Bienvenue ! </p>
                    </div>

                    <!-- Informations personnelles -->
                    <div class="profile-section mb-4">
                        <h5 class="section-title">Informations personnelles</h5>
                        <div class="info-row">
                            <span class="info-label">Prénom :</span>
                            <span class="info-value" th:text="${user.firstName}">Prénom</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Nom :</span>
                            <span class="info-value" th:text="${user.lastName}">Nom</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Email :</span>
                            <span class="info-value" th:text="${user.email}">Email</span>
                        </div>
                    </div>

                    <!-- Solde du compte -->
                    <div class="profile-section mb-4">
                        <h5 class="section-title">Mon compte</h5>
                        <div class="balance-card">
                            <p class="balance-label">Solde disponible</p>
                            <p class="balance-amount">
                                <span th:text="${user.userAccount.amount}">0.00</span>
                            </p>
                        </div>
                    </div>

                    <!-- Recharge du compte -->
                    <div class="profile-section mb-4">
                        <h5 class="section-title">Recharger mon compte</h5>
                        <form th:action="@{/profil/add-funds}" method="POST">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="form-floating mb-3">
                                <input type="number"
                                       name="amount"
                                       class="form-control"
                                       id="amount"
                                       placeholder="Montant"
                                       step="0.01" min="0.01">
                                <label for="amount">Montant (€)</label>
                            </div>
                            <button type="submit" class="btn btn-success w-100">
                                Ajouter des fonds
                            </button>
                        </form>
                    </div>

                    <!-- Boutons d'action -->
                    <div class="btn-group">
                        <a th:href="@{/transfer}" class="btn btn-primary">Envoyer de l'argent</a>
                        <a th:href="@{/contact}" class="btn btn-secondary">Mes contacts</a>
                        <form th:action="@{/logout}" method="POST" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-danger">Déconnexion</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
